<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Find OST</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
		<link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="./style.css">
	</head>
	<body>
		<!-- THE LONG WALK -->
        <section id="theLongWalk-container" class="container">
			<h2 class="container mb-4">The Long Walk</h2>
			<div id="div-container-theLongWalk">
				<div class="div-button-theLongWalk">
					<button class="button-theLongWalk"><img src="./img/movies/img-theLongWalk/theLogWalk-img1.jpeg" alt="the Long Walk image" /></button>
					<ul>
						<li>Olson</li>
						<li class="composer">Jeremiah Fraites</li>
					</ul>
				</div>
				<div class="div-button-theLongWalk">
					<button class="button-theLongWalk"><img src="./img/movies/img-theLongWalk/theLongWalk-img2.jpg" alt="the Long Walk image" /></button>
					<ul>
						<li>Mom</li>
						<li class="composer">Jeremiah Fraites</li>
					</ul>
				</div>
		</section>

        <hr class="divisionOfSections my-5" />

		<!-- ELEMENTAL -->
        <section id="elemental-container" class="container">
			<h2 class="container mb-4">Elemental</h2>
			<div id="div-container-elemental">
				<div class="div-button-elemental">
					<button class="button-elemental"><img src="./img/movies/img-elemental/elemental-img1.jpg" alt="elemental image" /></button>
					<ul>
						<li>Steal The Show</li>
						<li class="composer">Lauv</li>
					</ul>
				</div>
				<div class="div-button-elemental">
					<button class="button-elemental"><img src="./img/movies/img-elemental/elemental-img2.jpeg" alt="elemental image" /></button>
					<ul>
						<li>Bubble Date</li>
						<li class="composer">Thomas Newman</li>
					</ul>
				</div>
		</section>

         <hr class="divisionOfSections my-5" />

		<!-- CLOUDS -->
         <section id="clouds-container" class="container">
			<h2 class="container mb-4">Clouds</h2>
			<div id="div-container-clouds">
				<div class="div-button-clouds">
					<button class="button-clouds"><img src="./img/movies/img-clouds/clouds-img1.jpg" alt="clouds image" /></button>
					<ul>
						<li>Clouds</li>
						<li class="composer">Brian Tyler</li>
					</ul>
				</div>
				<div class="div-button-clouds">
					<button class="button-clouds"><img src="./img/movies/img-clouds/clouds-img2.jpeg" alt="clouds image" /></button>
					<ul>
						<li>Expectations</li>
						<li class="composer">Brian Tyler</li>
					</ul>
				</div>
                <div class="div-button-clouds">
					<button class="button-clouds"><img src="./img/movies/img-clouds/clouds-img1.jpg" alt="clouds image" /></button>
					<ul>
						<li>Upward</li>
						<li class="composer">Brian Tyler</li>
					</ul>
				</div>
                <div class="div-button-clouds">
					<button class="button-clouds"><img src="./img/movies/img-clouds/clouds-img2.jpeg" alt="clouds image" /></button>
					<ul>
						<li>Moments Fade</li>
						<li class="composer">Brian Tyler</li>
					</ul>
				</div>
		</section>

		<script src="/index.js"></script>
	</body>
</html>
